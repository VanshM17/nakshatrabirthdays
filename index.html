<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthdays | Nakshatra</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Scroll Progress Bar -->
  <div id="scrollProgressBar"></div>

  <!-- Stars canvas background -->
  <canvas id="starfield"></canvas>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="header-left">
        <img src="logo.png" draggable="false" alt="Nakshatra Society Logo" class="logo" onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
        <div id="logo-fallback" class="logo-fallback" style="display:none">🔭</div>
      </div>
      <div class="header-center">
        <h1 class="site-title">Nakshatra<span class="title-accent"> Birthdays</span></h1>
        <p class="site-subtitle">Celebrating every star in our constellation ✨</p>
      </div>
      <div class="header-right">
        <a href="about.html" class="about-link">About Us</a>
        <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>

  <!-- CONTROL BAR -->
  <div class="control-bar">
    <!-- Year Tabs -->
    <div class="tabs" id="yearTabs">
      <button class="tab-button active" data-year="2026" onclick="openYear(event,'2026')">2026</button>
      <button class="tab-button" data-year="2027" onclick="openYear(event,'2027')">2027</button>
      <button class="tab-button" data-year="2028" onclick="openYear(event,'2028')">2028</button>
      <button class="tab-button" data-year="2029" onclick="openYear(event,'2029')">2029</button>
      <span class="tab-underline" id="tabUnderline"></span>
    </div>

    <!-- Controls -->
    <div class="controls-right">
      <!-- Search -->
      <div class="search-wrap" id="searchWrap">
        <button class="icon-btn" id="searchToggle" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <input type="text" id="memberSearch" placeholder="Search members…" oninput="handleSearch()" autocomplete="off" />
        <button class="clear-search" id="clearSearch" aria-label="Clear search">×</button>
      </div>

      <!-- Sort -->
      <div class="sort-wrap">
        <button class="icon-btn sort-btn" id="sortToggle" aria-label="Sort">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
        </button>
        <div class="sort-dropdown" id="sortDropdown">
          <div class="sort-label">Sort by</div>
          <button class="sort-option active" data-sort="birthday" onclick="setSortMode('birthday')">📅 Birthday (Month)</button>
          <button class="sort-option" data-sort="name" onclick="setSortMode('name')">🔤 Name (A–Z)</button>
          <button class="sort-option" data-sort="role" onclick="setSortMode('role')">👑 Role</button>
        </div>
      </div>

      <!-- Chart Toggle -->
      <button class="icon-btn chart-btn" id="chartToggle" aria-label="Birthday chart" title="View birthday chart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="18" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="2" y="13" width="4" height="8"/></svg>
      </button>
    </div>
  </div>

  <!-- SEARCH RESULTS BANNER -->
  <div id="searchBanner" class="search-banner" style="display:none">
    <span id="searchBannerText"></span>
    <button onclick="clearSearch()">✕ Clear</button>
  </div>

  <!-- FUN FACT TICKER -->
  <div class="fun-fact-bar">
    <span class="fun-fact-label">✦ Did you know?</span>
    <div class="fun-fact-text" id="funFactText"></div>
  </div>

  <!-- CHART PANEL -->
  <div class="chart-panel" id="chartPanel">
    <div class="chart-panel-inner">
      <div class="chart-header">
        <h2>Birthday Distribution</h2>
        <div class="chart-view-toggle">
          <button class="cv-btn active" data-view="month" onclick="setChartView('month')">By Month</button>
          <button class="cv-btn" data-view="year" onclick="setChartView('year')">By Batch</button>
          <button class="cv-btn" data-view="role" onclick="setChartView('role')">By Role</button>
        </div>
        <button class="close-chart" onclick="toggleChart()" aria-label="Close chart">✕</button>
      </div>
      <div class="chart-stats" id="chartStats"></div>
      <div class="chart-container">
        <canvas id="birthdayChart"></canvas>
      </div>
    </div>
  </div>

  <!-- SEARCH RESULTS VIEW (global across all tabs) -->
  <div id="searchResultsView" class="tab-content" style="display:none">
    <div class="members-list" id="searchResultsList"></div>
  </div>

  <!-- TAB CONTENTS -->
  <div id="2026" class="tab-content"></div>
  <div id="2027" class="tab-content"></div>
  <div id="2028" class="tab-content"></div>
  <div id="2029" class="tab-content"></div>

  <div id="birthday-tooltip" class="bday-tooltip"></div>
